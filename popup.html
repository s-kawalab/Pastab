<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="popupTitle">Pastab</title>
  <link rel="stylesheet" href="src/styles/popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title" data-i18n="popupTitle">Pastab</h1>
      <span class="tab-count" id="tabCount">0</span>
    </header>

    <main class="main">
      <div class="button-group">
        <button class="btn btn-primary" id="copyBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span data-i18n="copyButton">Copy</span>
        </button>
        <button class="btn btn-secondary" id="pasteBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
          </svg>
          <span data-i18n="pasteButton">Paste</span>
        </button>
      </div>

      <div class="format-section">
        <label class="format-label" data-i18n="formatLabel">Format:</label>
        <select class="format-select" id="formatSelect">
          <option value="text" data-i18n="formatText">Text</option>
          <option value="text-title" data-i18n="formatTextTitle">Text + Title</option>
          <option value="html" data-i18n="formatHtml">HTML</option>
          <option value="json" data-i18n="formatJson">JSON</option>
          <option value="markdown" data-i18n="formatMarkdown">Markdown</option>
          <option value="custom" data-i18n="formatCustom">Custom</option>
        </select>
      </div>

    </main>

    <footer class="footer">
      <button class="btn-link" id="optionsBtn">
        <svg class="icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span data-i18n="optionsSettings">Settings</span>
      </button>
    </footer>

    <div class="notification" id="notification">
      <span id="notificationText"></span>
    </div>
  </div>

  <script src="src/popup.js" type="module"></script>
</body>
</html>
