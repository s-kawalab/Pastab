<!DOCTYPE html>
<html>
<head>
  <title>Pastab Icon Generator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    .icon-preview {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .icon-item {
      text-align: center;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .icon-item img, .icon-item canvas {
      display: block;
      margin: 10px auto;
      border: 1px solid #ddd;
    }
    .icon-item a {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #6366f1;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    .icon-item a:hover {
      background: #4f46e5;
    }
    .instructions {
      background: #e0f2fe;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Pastab Icon Generator</h1>

  <div class="instructions">
    <p><strong>使い方:</strong></p>
    <ol>
      <li>各サイズのアイコンの下にある「Download」ボタンをクリック</li>
      <li>ダウンロードしたPNGファイルを <code>icons/</code> フォルダに保存</li>
      <li>ファイル名を <code>icon16.png</code>, <code>icon32.png</code>, <code>icon48.png</code>, <code>icon128.png</code> に変更</li>
    </ol>
  </div>

  <div class="icon-preview" id="preview"></div>

  <script>
    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#5E5CE6"/>
          <stop offset="100%" style="stop-color:#3634A3"/>
        </linearGradient>
      </defs>
      <rect width="128" height="128" rx="28" fill="url(#bg)"/>
      <g>
        <rect x="46" y="24" width="50" height="64" rx="6" fill="white" opacity="0.35"/>
        <rect x="38" y="32" width="50" height="64" rx="6" fill="white" opacity="0.6"/>
        <rect x="30" y="40" width="50" height="64" rx="6" fill="white"/>
        <rect x="40" y="54" width="30" height="4" rx="2" fill="#5E5CE6"/>
        <rect x="40" y="64" width="22" height="4" rx="2" fill="#5E5CE6" opacity="0.4"/>
        <rect x="40" y="74" width="26" height="4" rx="2" fill="#5E5CE6" opacity="0.4"/>
        <rect x="40" y="84" width="18" height="4" rx="2" fill="#5E5CE6" opacity="0.4"/>
      </g>
    </svg>`;

    const sizes = [16, 32, 48, 128];

    const preview = document.getElementById('preview');

    sizes.forEach(size => {
      const div = document.createElement('div');
      div.className = 'icon-item';
      div.innerHTML = `<h3>${size}x${size}</h3>`;

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const img = new Image();
      const blob = new Blob([svgContent], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);

      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);

        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = `icon${size}.png`;
        link.textContent = `Download icon${size}.png`;
        div.appendChild(link);
      };

      img.src = url;
      div.appendChild(canvas);
      preview.appendChild(div);
    });
  </script>
</body>
</html>
